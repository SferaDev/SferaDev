name: Update OpenAPI

on:
  workflow_dispatch:
  schedule:
    - cron: "25 * * * *"

jobs:
  openapi-gen:
    name: Update ${{ matrix.package }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.package }}
      cancel-in-progress: true
    continue-on-error: true

    strategy:
      matrix:
        package:
          - vercel-api-js
          - netlify-api
          - zoom-api-js
          - keycloak-api
          - cloudflare-api-js
          - nuki-api-js
          - litellm-api
          - v0-api

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup and install
        uses: ./.github/actions/setup

      - name: Build OpenAPI spec from PR
        run: pnpm generate --filter=${{ matrix.package }}

      - name: Format code
        run: pnpm check:fix

      - name: Analyze changes and create changeset
        run: pnpm tsx ./.github/workflows/scripts/changes.ts ${{ matrix.package }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - run: git add .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GIT_TOKEN }}
          commit-message: "Update OpenAPI Spec"
          committer: "SferaDev <SferaDev@users.noreply.github.com>"
          title: "[OpenAPI] Spec updates for ${{ matrix.package }}"
          body: |
            This is an autogenerated PR to update the OpenAPI spec with the latest merged changes.

            Before merging these changes, please review the update and test it out.
          branch: openapi/${{ matrix.package }}
