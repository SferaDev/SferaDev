name: Update Dependencies

on:
  schedule:
    - cron: "0 7 * * 1" # Every Monday at 7am UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Update Dependencies
    runs-on: ubuntu-latest
    # mise (tool downloads) and pinact (Action tag lookups) query the GitHub REST
    # API. A job-level token authenticates those calls so they don't share the
    # anonymous 60 req/hour limit. create-pull-request is unaffected — it uses its
    # explicit `token:` input.
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Always base the update against the default branch so create-pull-request
          # has a valid `origin/main` to reset onto, even on a manual dispatch from
          # another branch.
          ref: main

      - name: Setup and install
        uses: ./.github/actions/setup
        with:
          # This job rewrites the lockfile, so it can't use a frozen install — it runs
          # its own `pnpm install` steps below. Only the toolchain is needed here.
          install-deps: "false"

      - name: Install new versions
        run: |
          # Bump the mise toolchain (node, pnpm, yq, pinact) to latest first, so the rest
          # of the run — and the generated lockfile — executes under the versions we pin.
          # Mirror the pnpm version into `packageManager`, which turbo and Vercel read.
          mise up --bump
          mise install
          jq --arg v "pnpm@$(mise current pnpm)" '.packageManager = $v' package.json > package.tmp && mv package.tmp package.json

          # Clear old security overrides before updating (regenerated by `pnpm audit --fix`
          # below). Intentional overrides such as the @kubb/renderer-jsx pin live in
          # pnpm-workspace.yaml and are left untouched.
          jq '.pnpm.overrides = {}' package.json > package.tmp && mv package.tmp package.json
          pnpm install --no-frozen-lockfile

          # Update dependencies.
          # `catalogMode: strict` (pnpm-workspace.yaml) makes `pnpm update --latest` abort
          # with ERR_PNPM_CATALOG_VERSION_MISMATCH: our published API-client packages declare
          # broad peer ranges (e.g. `effect: ^3.0.0`) that intentionally differ from the exact
          # catalog pin, and strict mode refuses to reconcile them while resolving "latest".
          # Relax to `manual` for the bump — catalog entries still update and the peer ranges
          # are left untouched — then restore `strict`.
          sed -i 's/^catalogMode: strict/catalogMode: manual/' pnpm-workspace.yaml
          pnpm update --recursive --latest
          sed -i 's/^catalogMode: manual/catalogMode: strict/' pnpm-workspace.yaml

          # Patch vulnerabilities (regenerates package.json pnpm.overrides). If a generated
          # override can't be resolved (e.g. a patched version not yet published to npm), drop
          # the overrides so the update PR still opens; they regenerate once the fix lands.
          pnpm audit --fix || true
          pnpm install --no-frozen-lockfile || {
            echo "::warning::install failed after audit --fix; clearing generated overrides and retrying"
            jq '.pnpm.overrides = {}' package.json > package.tmp && mv package.tmp package.json
            pnpm install --no-frozen-lockfile
          }

          # Update biome config, then fix formatting and linting issues
          pnpm biome migrate --write
          pnpm check:fix

          # Pin and update GitHub Actions to commit SHAs
          pinact run --update .github/workflows/*.yml .github/actions/*/action.yml

          # Commit changes
          git add .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GIT_TOKEN }}
          commit-message: "Update dependencies"
          committer: "SferaDev Bot <sferadev@users.noreply.github.com>"
          title: "Update dependencies"
          body: |
            This is an autogenerated PR to update the dependencies!
          branch: update-dependencies-${{ github.run_id }}
